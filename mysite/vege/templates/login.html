{% extends "base.html" %}
{% block start %}

<style>
    /* Page background image and centering */
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                    url('https://www.transparenttextures.com/patterns/food.png'); /* Subtle food pattern */
    }

    .login-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #eee;
    }

    .form-control:focus {
        border-color: #ff4757;
        box-shadow: 0 0 0 0.2rem rgba(255, 71, 87, 0.1);
    }

    .btn-login {
        background-color: #ff4757;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1.1rem;
        transition: 0.3s;
        color: white;
    }

    .btn-login:hover {
        background-color: #e84118;
        transform: translateY(-2px);
        color: white;
    }

    .login-icon {
        background: #fff2f2;
        color: #ff4757;
        width: 80px;
        height: 80px;
        line-height: 80px;
        border-radius: 50%;
        font-size: 2rem;
        margin: 0 auto 20px;
    }
</style>

<div class="login-container">
    <div class="container">
        <div class="row">
            <div class="col-lg-5 col-md-8 mx-auto">
                <div class="card login-card p-4 p-md-5">
                    
                    <div class="text-center">
                        <div class="login-icon">
                            <i class="fas fa-user-lock"></i>
                        </div>
                        <h2 class="fw-bold mb-2">Welcome Back!</h2>
                        <p class="text-muted mb-4">Please login to your account</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-at text-muted"></i></span>
                                <input type="text" class="form-control bg-light" name="username" placeholder="Enter username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control bg-light" name="password" placeholder="••••••••" required>
                            </div>
                            <div class="text-end mt-2">
                                <a href="#" class="text-decoration-none text-danger small">Forgot Password?</a>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login w-100 shadow-sm">Login Now</button>

                        <div class="mt-4 text-center">
                            <p class="mb-0 text-muted">Don't have an account? 
                                <a href="/register/" class="text-danger fw-bold text-decoration-none">Create Account</a>
                            </p>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

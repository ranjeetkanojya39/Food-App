<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <title>FoodieApp | {{page}}</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        /* Navbar Customization */
        .navbar {
            background-color: #ffffff !important;
            border-bottom: 1px solid #eee;
        }
        .navbar-brand {
            color: #ff4757 !important; /* Zomato/Food Red color */
            font-size: 1.5rem;
        }
        .nav-link {
            color: #2f3542 !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #ff4757 !important;
        }
        .btn-food {
            background-color: #ff4757;
            color: white;
            border-radius: 8px;
            padding: 8px 20px;
            border: none;
        }
        .btn-food:hover {
            background-color: #e84118;
            color: white;
        }
        .cart-icon {
            position: relative;
            font-size: 1.2rem;
            margin-right: 15px;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: #ff4757;
            color: white;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm p-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-utensils me-2"></i>Foodie
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Offers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Restaurants</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <a href="/cart/" class="nav-link cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge">0</span>
                </a>

                {% if request.user.is_authenticated %}
                    <span class="me-3 fw-semibold text-muted">Hi, {{request.user.username}}</span>
                    <a href="/logout/" class="btn btn-outline-danger btn-sm rounded-pill">Logout</a>
                {% else %}
                    <a href="/login/" class="btn btn-food">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="main-content">
    {% block start %}
    {% endblock %}
</div>

<footer class="bg-white text-center py-4 mt-5 border-top">
    <p class="text-muted mb-0">&copy; 2024 Foodie Express. Made with ❤️ for Food Lovers.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
